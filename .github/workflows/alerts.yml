name: Alpha Pulse - Project AlertShield Email Scheduler

on:
  schedule:
    # 1. Morning Briefing: Daily at 10:00 UTC (6:00 AM EST)
    - cron: '0 10 * * *'
    
    # 2. Afternoon Portfolio Check: Monday-Friday at 16:30 UTC (12:30 PM EST)
    - cron: '30 16 * * 1-5'
    
    # 3. Closing Portfolio Report: Monday-Friday at 20:15 UTC (4:15 PM EST)
    - cron: '15 20 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Choose alerting mode to run manually'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - monitors

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-module-cache: true
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase postgrest

      - name: Determine Run Mode
        id: run-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 16 * * 1-5" ]; then
            echo "mode=afternoon" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "15 20 * * 1-5" ]; then
            echo "mode=evening" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
          fi

      - name: Execute AlertShield Engine
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python scraper/alerts_engine.py --mode ${{ steps.run-mode.outputs.mode }}
